name: Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
        working-directory: frontend

      - run: npm run build
        working-directory: frontend

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build

      - uses: actions/deploy-pages@v4
